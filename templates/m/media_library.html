{% extends "base.html" %}
{% block title %}媒体库 - ORS{% endblock %}
{% block content %}
<div class="topbar">
  <div class="topbar-title">媒体库（{{ department.name }}）</div>
  <div class="topbar-actions">
    <a class="btn ghost" href="{% url 'course_manage_list' dept_code=dept_code %}">返回课程管理</a>
  </div>
</div>

<div class="container">
  <div class="card" style="margin-bottom:12px;">
    <div class="grid2">
      <div class="field">
        <label class="label">搜索文件名</label>
        <input id="searchInput" class="input" placeholder="输入关键字" />
      </div>
      <div class="field" style="display:flex;align-items:flex-end;">
        <button id="searchBtn" class="btn">搜索</button>
      </div>
    </div>
  </div>

  <div id="mediaGrid" class="media-grid">
    {% for a in assets %}
      <div class="media-card" data-id="{{ a.id }}">
        <img src="{{ a.file_url }}" alt="{{ a.file_name }}" />
        <div class="media-meta">
          <div class="media-name">{{ a.file_name }}</div>
          <div class="muted">{{ a.created_at }}</div>
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn small js-copy" data-url="{{ a.file_url }}">复制链接</button>
            <button class="btn small js-delete" data-id="{{ a.id }}">删除</button>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>

<script>
  (function(){
    const apiUrl = "{% url 'media_assets_api' dept_code=dept_code %}";
    const deleteBase = "{% url 'media_asset_delete' dept_code=dept_code asset_id=0 %}".replace('/0/delete/', '/__ID__/delete/');
    const grid = document.getElementById('mediaGrid');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    function getCookie(name) {
      const cookieValue = document.cookie.split('; ').find(row => row.startsWith(name + '='));
      return cookieValue ? decodeURIComponent(cookieValue.split('=')[1]) : '';
    }

    function bindActions(){
      grid.querySelectorAll('.js-copy').forEach(btn => {
        btn.onclick = async () => {
          const url = btn.dataset.url || '';
          await navigator.clipboard.writeText(url);
          btn.textContent = '已复制';
          setTimeout(() => btn.textContent = '复制链接', 1200);
        };
      });
      grid.querySelectorAll('.js-delete').forEach(btn => {
        btn.onclick = async () => {
          if (!confirm('确认删除该图片记录？')) return;
          const id = btn.dataset.id;
          const res = await fetch(deleteBase.replace('__ID__', id), {
            method: 'POST',
            credentials: 'same-origin',
            headers: {'X-CSRFToken': getCookie('csrftoken')}
          });
          if (res.ok) {
            btn.closest('.media-card')?.remove();
            return;
          }
          const data = await res.json().catch(() => ({}));
          if (res.status === 409 && data.error === 'asset_in_use') {
            const list = (data.courses || []).map(x => `- ${x}`).join('\n');
            alert((data.message || '该图片正在被引用，无法删除。') + (list ? `\n\n引用教程：\n${list}` : ''));
          } else {
            alert('删除失败，请稍后重试');
          }
        };
      });
    }

    async function search() {
      const q = encodeURIComponent(searchInput.value || '');
      const res = await fetch(apiUrl + '?q=' + q, {credentials: 'same-origin'});
      if (!res.ok) return;
      const data = await res.json();
      grid.innerHTML = (data.assets || []).map(a => `
        <div class="media-card" data-id="${a.id}">
          <img src="${a.file_url}" alt="${a.file_name}" />
          <div class="media-meta">
            <div class="media-name">${a.file_name}</div>
            <div class="muted">${a.created_at}</div>
            <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
              <button class="btn small js-copy" data-url="${a.file_url}">复制链接</button>
              <button class="btn small js-delete" data-id="${a.id}">删除</button>
            </div>
          </div>
        </div>
      `).join('');
      bindActions();
    }

    searchBtn?.addEventListener('click', search);
    searchInput?.addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });
    bindActions();
  })();
</script>
{% endblock %}
