{% extends "base.html" %}
{% block title %}{{ course.title }} - 访问验证{% endblock %}
{% block content %}
<div class="topbar">
  <div class="topbar-title">公开课程访问验证</div>
</div>

<div class="container">
  <div class="card" style="max-width:520px;margin:24px auto;">
    <div class="card-title">{{ course.title }}</div>
    <div class="card-sub" style="margin-top:6px;">该课程设置了访问密码，请输入后继续。</div>
    {% if messages %}
      {% for message in messages %}
        <div class="card-sub" style="margin-top:10px;color:#b91c1c;">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post" style="margin-top:14px;">
      {% csrf_token %}
      <div class="field">
        <label class="label">访问密码</label>
        <input class="input" type="password" name="access_password" autocomplete="off" required />
      </div>
      <button class="btn primary" type="submit">进入课程</button>
    </form>
  </div>
</div>
{% endblock %}
