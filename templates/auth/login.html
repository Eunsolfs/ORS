{% extends "base.html" %}
{% block title %}登录 - ORS{% endblock %}
{% block content %}
<div class="container login-container">
  <div class="card">
    <h1 class="h1">ORS 登录</h1>
    <form method="post" class="form">
      {% csrf_token %}
      <div class="field">
        <label class="label">账号</label>
        {{ form.username }}
      </div>
      <div class="field">
        <label class="label">密码</label>
        {{ form.password }}
      </div>
      <div class="field">
        <label class="label">验证码</label>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          {{ form.captcha }}
        </div>
      </div>
      {% if form.errors %}
        <div class="alert">账号、密码或验证码错误</div>
      {% endif %}
      <button class="btn primary" type="submit">登录</button>
    </form>
  </div>
</div>
{% endblock %}
